<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Community Event Portal</title>

    <link rel="stylesheet" href="style.css">

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

    <h1>Local Community Event Portal</h1>

    <!-- Filter -->
    <select id="categoryFilter">
        <option value="all">All</option>
        <option value="Music">Music</option>
        <option value="Workshop">Workshop</option>
        <option value="Sports">Sports</option>
    </select>

    <!-- Search -->
    <input type="text"
           id="searchBox"
           placeholder="Search event">

    <!-- Loading -->
    <div id="loading">Loading events...</div>

    <!-- Event Container -->
    <div id="eventContainer"></div>

    <hr>

    <!-- Registration Form -->
    <h2>Register for Event</h2>

    <form id="registerForm">

        <input type="text"
               name="username"
               placeholder="Enter Name">

        <span class="error" id="nameError"></span>

        <br><br>

        <input type="email"
               name="email"
               placeholder="Enter Email">

        <span class="error" id="emailError"></span>

        <br><br>

        <select name="eventName">
            <option value="">Select Event</option>
            <option value="Music Night">Music Night</option>
            <option value="Baking Workshop">Baking Workshop</option>
            <option value="Football Match">Football Match</option>
        </select>

        <span class="error" id="eventError"></span>

        <br><br>

        <button type="submit" id="registerBtn">
            Submit Registration
        </button>

    </form>

    <p id="message"></p>

    <!-- External JS -->
    <script src="main.js"></script>

</body>
</html>
