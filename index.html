<!DOCTYPE html>
<html lang="en">
<!-- HTML5 base template -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Event Portal</title>

    <link rel="stylesheet" href="style.css">


    <!-- Internal CSS -->

    <style>

body{
    font-family: Arial;
    margin:20px;
}

nav{
    background:black;
    padding:15px;
}

nav a{
    color:white;
    margin-right:20px;
    text-decoration:none;
}

#welcomeBanner{
    background:skyblue;
    padding:20px;
    margin-top:20px;
}

.highlight{
    color:darkblue;
}

.galleryImage{
    border:3px solid black;
    width:200px;
    height:150px;
}

form{
    background:#f2f2f2;
    padding:20px;
    width:400px;
}

input, select, textarea{
    width:100%;
    margin-bottom:10px;
    padding:8px;
}

table{
    margin-top:20px;
}

</style>
</head>

<body onbeforeunload="return warningMessage()">

    <!-- Navigation -->
    
    <!-- Main -->

    <!-- Footer -->

    <script src="script.js"></script>


    <!-- Navigating and linking -->
     <nav>

    <a href="#home">Home</a>

    <a href="#events">Events</a>

    <a href="#contact">Contact</a>

    <a href="help.html" target="_blank">Help</a>

</nav>
<section id="home">

    <h1>Welcome to Community Portal</h1>

</section>

<section id="events">

    <h2>Events Section</h2>

</section>

<section id="contact">

    <h2>Contact Section</h2>

</section>

<!-- Welcom Banner -->

<div id="welcomeBanner">

    <h2 class="highlight">
        Welcome Resident
    </h2>

    <p>
        Register today and get
        <span style="color:red; font-weight:bold;">
            Free Snacks
        </span>
    </p>

</div>


<!-- Image gallery -->
<h2>Past Community Events</h2>

<table border="1">

<tr>

<td>
<img src="https://picsum.photos/200/150"
class="galleryImage"
alt="Music Event"
title="Music Event">

<p><b>Music Festival</b></p>
</td>

<td>
<img src="https://picsum.photos/200/150"
class="galleryImage"
alt="Food Event"
title="Food Event">

<p><i>Food Carnival</i></p>
</td>

<td>
<img src="https://picsum.photos/200/150"
class="galleryImage"
alt="Sports Event"
title="Sports Event">

<p><u>Sports Day</u></p>
</td>

</tr>

<tr>

<td>
<img src="https://picsum.photos/200/150"
class="galleryImage"
alt="Dance Event"
title="Dance Event">
</td>

<td>
<img src="https://picsum.photos/200/150"
class="galleryImage"
alt="Book Fair"
title="Book Fair">
</td>

<td>
<img src="https://picsum.photos/200/150"
class="galleryImage"
alt="Art Show"
title="Art Show">
</td>

</tr>

</table>

<!-- Registration Form -->

<h2>Event Registration</h2>

<form id="eventForm">

<input type="text"
id="name"
placeholder="Enter your name"
required
autofocus>

<input type="email"
placeholder="Enter email"
required>

<input type="date"
required>

<select id="eventType" onchange="showFee()">

<option value="">Select Event</option>

<option value="100">Music Event</option>

<option value="200">Food Carnival</option>

<option value="300">Sports Day</option>

</select>

<p id="feeDisplay"></p>

<input type="text"
id="phone"
placeholder="Phone Number"
onblur="validatePhone()">

<textarea
id="feedback"
placeholder="Feedback"
onkeyup="countCharacters()">
</textarea>

<p id="charCount"></p>

<button type="button" onclick="submitForm()">
Submit
</button>

<output id="outputMessage"></output>

</form>


<!-- Video section -->

<h2>Event Promo Video</h2>

<video width="400"
controls
oncanplay="videoReady()">

<source
src="https://www.w3schools.com/html/mov_bbb.mp4"
type="video/mp4">

</video>

<p id="videoMessage"></p>


<!-- Geolocation section -->

<h2>Find Nearby Events</h2>

<button onclick="findLocation()">
Find Nearby Events
</button>

<p id="location"></p>


<!-- Local Storage buttons -->

<button onclick="savePreference()">
Save Preference
</button>

<button onclick="clearPreferences()">
Clear Preferences
</button>

</body>
</html>
